<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RAG Agent - MVP-A</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }
        .sidebar, .main-chat {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar { gap: 20px; overflow-y: auto; }
        h1, h2, h3 { margin: 0 0 10px 0; }
        h1 { font-size: 1.2em; color: #667eea; }
        h2 { font-size: 1em; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { background: #f0f2ff; border-color: #764ba2; }
        .upload-area input { display: none; }
        .doc-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        .doc-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .doc-item:last-child { border-bottom: none; }
        .doc-name { flex: 1; font-size: 0.9em; word-break: break-all; }
        .doc-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; position: relative; }
        .message.user { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.assistant { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.system { background: #fff3cd; color: #856404; align-self: center; font-size: 0.9em; max-width: 90%; }
        .message.action { background: #d1ecf1; color: #0c5460; align-self: center; font-size: 0.9em; max-width: 90%; }
        .citation {
            display: inline-block;
            font-size: 0.75em;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 4px 2px 0 2px;
            cursor: pointer;
        }
        .input-area { display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid #eee; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: 2px solid #e9ecef; border-radius: 24px; font-size: 1em; outline: none; }
        input[type="text"]:focus { border-color: #667eea; }
        button.send-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
        }
        button.send-btn:disabled { background: #ccc; cursor: not-allowed; }
        .approval-bar {
            display: none;
            gap: 10px;
            margin-top: 10px;
            padding: 12px;
            border: 1px solid #f0ad4e;
            border-radius: 8px;
            background: #fff8e1;
            align-items: center;
            justify-content: space-between;
        }
        .approval-bar.visible { display: flex; }
        .approval-actions { display: flex; gap: 8px; }
        .approval-actions button { border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
        .approve-btn { background: #28a745; color: white; }
        .deny-btn { background: #dc3545; color: white; }
        .status-line { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <h2>Documents</h2>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" multiple accept=".txt,.pdf,.md,.docx,.xlsx" onchange="uploadFiles()">
            <div>Click to upload</div>
            <small style="color: #666;">TXT, PDF, MD, DOCX, XLSX</small>
        </div>
        <div id="uploadProgress" style="display:none; padding:10px; background:#fff3cd; border-radius:8px; margin-top:10px;">
            <div class="status-line"><span id="progressText">Dang xu ly...</span></div>
            <progress id="progressBar" value="0" max="100" style="width:100%;"></progress>
        </div>
        <div class="doc-count" id="docCount">0 documents</div>
        <ul class="doc-list" id="docList"></ul>
    </aside>

    <main class="main-chat">
        <h2>Chat</h2>
        <div class="messages" id="messages">
            <div class="message assistant">Xin chao! Toi la tro ly AI cua ban. Upload tai lieu va hoi toi bat cu dieu gi ve noi dung do.</div>
        </div>
        <div id="agentNotice" class="approval-bar">
            <div id="agentNoticeText">Yeu cau can xac nhan.</div>
            <div class="approval-actions">
                <button class="approve-btn" onclick="confirmIntent()">Xac nhan</button>
                <button class="deny-btn" onclick="clearPending()">Huy</button>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Nhap tin nhan..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </main>
</div>

<script>
    const API_BASE = 'http://localhost:8000';
    let sessionId = localStorage.getItem('lastSessionId') || `session-${Date.now()}`;
    let pendingIntent = null;
    let pendingSuggestedRoute = null;
    let pendingMessage = '';
    let pendingApproval = null;

    async function uploadFiles() {
        const input = document.getElementById('fileInput');
        const files = input.files;
        if (!files.length) return;

        const progressDiv = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        progressDiv.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            progressText.textContent = `Dang upload ${file.name}...`;
            progressBar.value = (i / files.length) * 100;

            try {
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok || data.success === false) throw new Error(data.detail || data.error || 'Upload failed');
                progressText.textContent = `Da upload ${file.name} (${data.chunk_count} chunks)`;
            } catch (err) {
                progressText.textContent = `Loi: ${err.message}`;
            }
        }

        progressBar.value = 100;
        setTimeout(() => {
            progressDiv.style.display = 'none';
            loadDocuments();
        }, 1000);
    }

    async function loadDocuments() {
        try {
            const res = await fetch(`${API_BASE}/api/documents`);
            const docs = await res.json();
            const list = document.getElementById('docList');
            list.innerHTML = '';
            docs.forEach(doc => {
                const li = document.createElement('li');
                li.className = 'doc-item';
                li.innerHTML = `<span class="doc-name">${escapeHtml(doc.filename)}</span><button class="doc-delete" onclick="deleteDocument('${doc.id}')">Delete</button>`;
                list.appendChild(li);
            });
            document.getElementById('docCount').textContent = `${docs.length} documents`;
        } catch (err) {
            console.error('Failed to load documents:', err);
        }
    }

    async function deleteDocument(docId) {
        if (!confirm('Xoa tai lieu nay?')) return;
        try {
            await fetch(`${API_BASE}/api/documents/${docId}`, { method: 'DELETE' });
            loadDocuments();
        } catch (err) {
            console.error('Failed to delete document:', err);
        }
    }

    async function sendMessage(forceConfirmed = false) {
        const input = document.getElementById('messageInput');
        const btn = document.getElementById('sendBtn');
        const message = (pendingMessage || input.value).trim();
        if (!message) return;

        input.disabled = true;
        btn.disabled = true;
        addMessage('user', message);
        input.value = '';
        addSystemMessage('Dang xu ly...');

        try {
            const payload = { message, session_id: sessionId };
            if (forceConfirmed) {
                payload.intent_confirmed = true;
                payload.suggested_route = pendingSuggestedRoute;
            }
            const res = await fetch(`${API_BASE}/api/agent`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            removeSystemMessage();

            if (data.status === 'intent_confirmation') {
                pendingIntent = data.intent;
                pendingSuggestedRoute = data.suggested_route;
                pendingMessage = message;
                showAgentNotice(data.response);
                addMessage('action', data.response);
            } else if (data.status === 'pending_approval') {
                pendingApproval = data.approval_id;
                showAgentNotice(`Yeu cau dang cho phe duyet: ${data.response}`);
                addMessage('action', data.response);
            } else {
                pendingIntent = null;
                pendingSuggestedRoute = null;
                pendingApproval = null;
                pendingMessage = '';
                hideAgentNotice();
                addMessage('assistant', data.response, data.citations || []);
                localStorage.setItem('lastSessionId', sessionId);
            }
        } catch (err) {
            removeSystemMessage();
            addMessage('assistant', `Loi: ${err.message}. Kiem tra backend dang chay tai ${API_BASE}`);
        } finally {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }
    }

    async function confirmIntent() {
        if (pendingApproval) {
            await decideApproval('approve');
            return;
        }
        if (!pendingMessage) return;
        hideAgentNotice();
        await sendMessage(true);
    }

    async function decideApproval(decision) {
        if (!pendingApproval) return;
        const approvalId = pendingApproval;
        try {
            await fetch(`${API_BASE}/api/approvals/${approvalId}/decide`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ decision })
            });
            if (decision === 'approve') {
                const res = await fetch(`${API_BASE}/api/agent/continue`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, approval_id: approvalId, approved: true })
                });
                const data = await res.json();
                hideAgentNotice();
                pendingApproval = null;
                pendingSuggestedRoute = null;
                addMessage('assistant', data.response, data.tool_result ? [data.tool_result] : []);
            } else {
                hideAgentNotice();
                pendingApproval = null;
                pendingSuggestedRoute = null;
                addMessage('assistant', 'Han dong da bi tu choi.');
            }
        } catch (err) {
            addMessage('assistant', `Loi phe duyet: ${err.message}`);
        }
    }

    function showAgentNotice(text) {
        const bar = document.getElementById('agentNotice');
        const label = document.getElementById('agentNoticeText');
        label.textContent = text;
        bar.classList.add('visible');
    }

    function hideAgentNotice() {
        document.getElementById('agentNotice').classList.remove('visible');
    }

    async function clearPending() {
        if (pendingApproval) {
            await decideApproval('deny');
            return;
        }
        pendingIntent = null;
        pendingSuggestedRoute = null;
        pendingMessage = '';
        pendingApproval = null;
        hideAgentNotice();
    }

    function addMessage(role, content, citations = []) {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        let html = escapeHtml(content);
        if (citations && citations.length > 0) {
            html += '<br><small>Nguon: ';
            html += citations.map(c => `<span class="citation" title="Do tin cay: ${(c.score || 0).toFixed(2)}">${escapeHtml(c.filename || c.doc_id || 'source')}</span>`).join(' ');
            html += '</small>';
        }
        msgDiv.innerHTML = html;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addSystemMessage(text) {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message system';
        msgDiv.id = 'system-msg';
        msgDiv.innerHTML = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeSystemMessage() {
        const el = document.getElementById('system-msg');
        if (el) el.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function loadHistory() {
        try {
            const res = await fetch(`${API_BASE}/api/chat/history/${sessionId}`);
            if (!res.ok) return;
            const messages = await res.json();
            const messagesDiv = document.getElementById('messages');
            if (messages.length === 0) return;
            messagesDiv.innerHTML = '';
            messages.forEach(msg => addMessage(msg.role, msg.content, msg.citations));
        } catch (err) {
            console.error('Failed to load history:', err);
        }
    }

    loadDocuments();
    loadHistory();
</script>
</body>
</html>
