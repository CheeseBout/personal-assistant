<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Local RAG Agent - MVP-A</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .main-chat {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        h1, h2, h3 { margin: 0 0 10px 0; }
        h1 { font-size: 1.2em; color: #667eea; }
        h2 { font-size: 1em; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 8px; }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        .upload-area input {
            display: none;
        }
        .doc-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
        }
        .doc-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .doc-item:last-child { border-bottom: none; }
        .doc-name {
            flex: 1;
            font-size: 0.9em;
            word-break: break-all;
        }
        .doc-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .doc-delete:hover { background: #c82333; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            position: relative;
        }
        .message.user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.system {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            font-size: 0.9em;
            max-width: 90%;
        }
        .citation {
            display: inline-block;
            font-size: 0.75em;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 4px 2px 0 2px;
            cursor: pointer;
        }
        .citation:hover {
            background: rgba(102, 126, 234, 0.2);
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #667eea;
        }
        button.send-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        button.send-btn:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }
        button.send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 0.85em;
            color: #666;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .status.processing { background: #fff3cd; color: #856404; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }

        .doc-count {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
        }

        .loading-dots:after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>🤖 Local RAG Agent</h1>
            <h2>📚 Documents</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" multiple accept=".txt,.pdf,.md,.docx,.xlsx" onchange="uploadFiles()">
                <div>📁 Click to upload</div>
                <small style="color: #666;">TXT, PDF, MD, DOCX, XLSX</small>
            </div>
            <div id="uploadProgress" style="display: none; padding: 10px; background: #fff3cd; border-radius: 8px; margin-top: 10px;">
                <div class="status processing">
                    <span id="progressText">Đang xử lý...</span>
                    <span class="loading-dots"></span>
                </div>
                <progress id="progressBar" value="0" max="100" style="width: 100%; margin-top: 8px;"></progress>
            </div>
            <div class="doc-count" id="docCount">0 documents</div>
            <ul class="doc-list" id="docList"></ul>
        </aside>

        <main class="main-chat">
            <h2>💬 Chat</h2>
            <div class="messages" id="messages">
                <div class="message assistant">
                    Xin chào! Tôi là trợ lý AI của bạn. Upload tài liệu và hỏi tôi bất cứ điều gì về nội dung đó.
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Nhập câu hỏi của bạn..." onkeypress="handleKeyPress(event)" autocomplete="off">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Gửi</button>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let sessionId = localStorage.getItem('sessionId') || generateId();
        localStorage.setItem('sessionId', sessionId);

        function generateId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        async function uploadFiles() {
            const input = document.getElementById('fileInput');
            const files = input.files;
            if (files.length === 0) return;

            const progressDiv = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            progressDiv.style.display = 'block';
            input.value = '';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                progressText.textContent = `Đang upload ${file.name}...`;
                progressBar.value = ((i) / files.length) * 100;

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch(`${API_BASE}/api/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || 'Upload failed');
                    }

                    const data = await res.json();
                    console.log('Uploaded:', data);
                    progressText.textContent = `Đã upload ${file.name} (${data.chunk_count} chunks)`;
                } catch (err) {
                    progressText.textContent = `Lỗi: ${err.message}`;
                    console.error('Upload failed:', err);
                }

                progressBar.value = ((i + 1) / files.length) * 100;
            }

            setTimeout(() => {
                progressDiv.style.display = 'none';
                loadDocuments();
            }, 1000);
        }

        async function loadDocuments() {
            try {
                const res = await fetch(`${API_BASE}/api/documents`);
                const docs = await res.json();

                const list = document.getElementById('docList');
                list.innerHTML = docs.map(doc => `
                    <li class="doc-item">
                        <span class="doc-name" title="${doc.filename}">${doc.filename}</span>
                        <button class="doc-delete" onclick="deleteDoc('${doc.id}')">Xóa</button>
                    </li>
                `).join('');

                document.getElementById('docCount').textContent = `${docs.length} documents`;
            } catch (err) {
                console.error('Failed to load documents:', err);
            }
        }

        async function deleteDoc(docId) {
            if (!confirm('Xóa tài liệu này?')) return;

            try {
                await fetch(`${API_BASE}/api/documents/${docId}`, { method: 'DELETE' });
                loadDocuments();
            } catch (err) {
                console.error('Failed to delete document:', err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            if (!message) return;

            input.disabled = true;
            btn.disabled = true;

            addMessage('user', message);
            input.value = '';

            addMessage('system', 'Đang xử lý...');

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await res.json();

                removeSystemMessage();
                addMessage('assistant', data.response, data.citations);

                // Save session
                localStorage.setItem('lastSessionId', sessionId);
            } catch (err) {
                removeSystemMessage();
                addMessage('assistant', `Lỗi: ${err.message}. Kiểm tra backend đang chạy tại ${API_BASE}`);
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        function addMessage(role, content, citations = []) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            let html = escapeHtml(content);

            if (citations && citations.length > 0) {
                html += '<br><small>Nguồn: ';
                html += citations.map(c =>
                    `<span class="citation" title="Độ tin cậy: ${(c.score || 0).toFixed(2)}">${c.filename || c.doc_id}</span>`
                ).join(' ');
                html += '</small>';
            }

            msgDiv.innerHTML = html;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.id = 'system-msg';
            msgDiv.innerHTML = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeSystemMessage() {
            const el = document.getElementById('system-msg');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/chat/history/${sessionId}`);
                if (!res.ok) return;

                const messages = await res.json();
                const messagesDiv = document.getElementById('messages');
                // Keep welcome message if no history
                if (messages.length === 0) return;

                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    addMessage(msg.role, msg.content, msg.citations);
                });
            } catch (err) {
                console.error('Failed to load history:', err);
            }
        }

        // Load on start
        loadDocuments();
        loadHistory();
    </script>
</body>
</html>
